
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="newst.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;0,900;1,500&family=Poppins:wght@200&family=Roboto&display=swap" rel="stylesheet">

    <title>Login</title>

</head>
<body>
   <div class="hero">
        <div class="box">
            <div class="container">

                <div class="top">
                    <span><b>Have an account?</b></span>
                    <header><b>Login</b></header>
                </div>

                <div class="input-field">
            <input type="text" class="input" placeholder="Username" id="">
            <i class='bx bx-user' ></i>
        </div>

        <div class="input-field">
            <input type="Password" class="input" placeholder="Password" id="">
            <i class='bx bx-lock-alt'></i>
        </div>

        <div class="input-field">
            <input type="submit" class="submit" value="Login" id="">
        </div>

        <div class="two-col">
            <div class="one">
               <input type="checkbox" name="" id="check">
               <label for="check"><b>Remember Me</b></label>
            </div>
            <div class="two">
                <label><a href="#"><b>Forgot password?</b></a></label>
            </div>
        </div>
    </div>
        <div class="side-bar">
            <img src="images/menu.png" class="menu">

            <div class="social-links">
                <img src="images/fb.png" >
                <img src="images/ig.png" >
                <img src="images/tw.png" >
            </div>

            <div class="useful-links">
                <img src="images/share.png" >
                <img src="images/info.png" >

            </div>
        </div>
        <div class="bubbles">
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
            <img src="images/bubble.png" >
        </div>
    </div>
</div>  
</body>
</html>
